# --- General ---
set -g default-terminal "screen-256color"
set -g terminal-overrides ",xterm-256color:Tc"
set -g history-limit 10000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 10

# --- Prefix ---
set -g prefix C-b

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Splits ---
bind | split-window -h
bind - split-window -v

# --- Vim navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Resize ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Appearance ---
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 100
set -g status-right-length 100

# Status bar
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa] #S #[fg=#89b4fa,bg=#1e1e2e,nobold]"
set -g status-right "#[fg=#a6e3a1] #(uptime | cut -d' ' -f4,5 | cut -d',' -f1) #[fg=#f9e2af] %a %b %d #[fg=#89b4fa] %H:%M "

# Windows
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa] #I:#W "
setw -g window-status-current-style "bg=#89b4fa"
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# Message
set -g message-style "bg=#89b4fa,fg=#1e1e2e"
set -g message-command-style "bg=#89b4fa,fg=#1e1e2e"

# Copy mode
setw -g mode-style "bg=#45475a,fg=#cdd6f4"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect / continuum
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-save-bash-history 'on'

# Prevent accidental tmux suspension (prefix + C-z)
set -g suspend-client off

# Save/Restore keybinds
bind s run "~/.tmux/plugins/tmux-resurrect/scripts/save.sh"
bind C-r run "~/.tmux/plugins/tmux-resurrect/scripts/restore.sh"

# --- Initialize TPM (plugins) ---
run '~/.tmux/plugins/tpm/tpm'
